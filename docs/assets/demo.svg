<svg xmlns="http://www.w3.org/2000/svg" width="760" height="440" viewBox="0 0 760 440" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <rect width="760" height="440" rx="10" fill="#0d1117"/>
  <rect width="760" height="34" rx="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="380" y="21" fill="#8b949e" text-anchor="middle">harscrub — audit · scrub · share</text>

  <text x="24" y="64" fill="#7ee787">$ harscrub audit session.har</text>
  <text x="24" y="88" fill="#c9d1d9" xml:space="preserve">ENTRY  LOCATION          RULE         ITEM           PREVIEW</text>
  <text x="24" y="108" fill="#c9d1d9" xml:space="preserve">#1     request.headers   header       authorization  <tspan fill="#f85149">eyJhbGciOiJI…</tspan></text>
  <text x="24" y="128" fill="#c9d1d9" xml:space="preserve">#1     request.headers   cookie       sessionid      <tspan fill="#f85149">b1946ac92492…</tspan></text>
  <text x="24" y="148" fill="#c9d1d9" xml:space="preserve">#0     request.postData  body-key     password       <tspan fill="#f85149">hunter2</tspan></text>
  <text x="24" y="168" fill="#8b949e">25 findings in 4 entries   (exit 1 — wire it into CI)</text>

  <text x="24" y="202" fill="#7ee787">$ harscrub scrub session.har -o clean.har</text>
  <text x="24" y="222" fill="#c9d1d9">harscrub: 25 values redacted across 4 entries (mode: mask)</text>
  <text x="24" y="246" fill="#8b949e" xml:space="preserve">- "authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6…"</text>
  <text x="24" y="266" fill="#c9d1d9" xml:space="preserve">+ "authorization": "Bearer <tspan fill="#d29922">[REDACTED]</tspan>"</text>
  <text x="24" y="286" fill="#8b949e" xml:space="preserve">- "url": ".../v1/profile?fields=name&amp;access_token=eyJhbG…"</text>
  <text x="24" y="306" fill="#c9d1d9" xml:space="preserve">+ "url": ".../v1/profile?fields=name&amp;access_token=<tspan fill="#d29922">%5BREDACTED%5D</tspan>"</text>

  <text x="24" y="340" fill="#7ee787">$ harscrub scrub session.har --mode hash --salt team42 | grep -c 84ee6fec</text>
  <text x="24" y="360" fill="#c9d1d9">3   <tspan fill="#8b949e"># same token, same tag — correlate without leaking</tspan></text>

  <text x="24" y="394" fill="#7ee787">$ harscrub audit clean.har &amp;&amp; echo safe-to-share</text>
  <text x="24" y="414" fill="#c9d1d9">no redactable values found  <tspan fill="#28c840">safe-to-share</tspan></text>
</svg>
